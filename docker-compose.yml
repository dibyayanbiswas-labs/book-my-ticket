services:
  postgresdb:
    image: postgres:17
    container_name: book_my_ticket_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: book_my_ticket_db
    ports:
      - "5432:5432"
    volumes:
      - 'postgres_data:/var/lib/postgresql/data'

volumes:
  postgres_data: